spring.application.name=biocore-backend
server.port=${PORT:8085}

# ============================================
# PostgreSQL - Neon Cloud
# ============================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=true

# ============================================
# JWT Configuration
# ============================================
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000

# ============================================
# CORS
# ============================================
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200,http://localhost:4201}

# Frontend URL (usado en emails)
app.frontend.url=${FRONTEND_URL:http://localhost:4200}

# ============================================
# File Upload (RN-05: max 20MB)
# ============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
app.upload.dir=uploads/

# ============================================
# Email (SendGrid HTTP API)
# ============================================
sendgrid.api.key=${SENDGRID_API_KEY}
sendgrid.from.email=biocore.hospital@gmail.com
sendgrid.from.name=BioCore Medical

# ============================================
# Logging
# ============================================
logging.level.com.biocore=INFO
logging.level.org.springframework.security=WARN
