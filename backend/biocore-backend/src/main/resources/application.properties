spring.application.name=biocore-backend
server.port=${PORT:8085}

# ============================================
# PostgreSQL - Neon Cloud
# ============================================
spring.datasource.url=jdbc:postgresql://ep-purple-moon-aje0qf8c-pooler.c-3.us-east-2.aws.neon.tech/neondb?sslmode=require&prepareThreshold=0
spring.datasource.username=neondb_owner
spring.datasource.password=npg_ilZ0JGINFgj2
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=true

# ============================================
# JWT Configuration
# ============================================
app.jwt.secret=BioCoreSecretKeyForJWT2024HospitalInformationSystem256BitsRequired
app.jwt.expiration=86400000

# ============================================
# CORS
# ============================================
app.cors.allowed-origins=http://localhost:4200,http://localhost:4201,https://biocorehospital.up.railway.app

# Frontend URL (usado en emails)
app.frontend.url=https://biocorehospital.up.railway.app

# ============================================
# File Upload (RN-05: max 20MB)
# ============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
app.upload.dir=uploads/

# ============================================
# Email (SendGrid HTTP API)
# ============================================
sendgrid.api.key=${SENDGRID_API_KEY:SG_placeholder}
sendgrid.from.email=biocore.hospital@gmail.com
sendgrid.from.name=BioCore Medical

# ============================================
# Logging
# ============================================
logging.level.com.biocore=INFO
logging.level.org.springframework.security=WARN
